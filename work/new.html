<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>New Client Registration</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" integrity="sha512-SnH5WK+bZxgPHs44uWIX+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkcmfRyVX3pBnMFcV7oQPJkl9QevSCWr3W6A==" crossorigin="anonymous" referrerpolicy="no-referrer" />

    <style>
        body {
            /* Matches your yellow to red gradient */
            background: linear-gradient(135deg, #f1c40f, #e74c3c) !important;
        }
        .register-card {
            width: 100%;
            max-width: 600px;
            border-radius: 15px;
        }
    </style>
</head>
<body>

    <div class="container d-flex justify-content-center align-items-center min-vh-100 my-5">
        <div class="card p-4 shadow register-card">
            <h3 class="text-center mb-2 text-danger fw-bold">Client Onboarding</h3>
            <p class="text-center text-muted mb-4">CREATE A NEW ACCOUNT</p>
            
            <div id="error-message" class="alert alert-danger d-none" role="alert"></div>
            <div id="success-message" class="alert alert-success d-none" role="alert"></div>

            <form id="registrationForm">
                
                <h5 class="text-secondary border-bottom pb-2 mb-3"><i class="fa-solid fa-briefcase me-2"></i>Business Info</h5>
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label for="companyName" class="form-label">Company/Client Name</label>
                        <input type="text" id="companyName" class="form-control" required placeholder="e.g. Obasphere Solutions">
                    </div>
                    <div class="col-md-6 mb-3">
                        <label for="clientEmail" class="form-label">Business Email</label>
                        <input type="email" id="clientEmail" class="form-control" required placeholder="client@company.com">
                    </div>
                </div>

                <h5 class="text-secondary border-bottom pb-2 mb-3 mt-2"><i class="fa-solid fa-user me-2"></i>Primary Contact</h5>
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label for="contactName" class="form-label">Full Name</label>
                        <input type="text" id="contactName" class="form-control" required placeholder="John Doe">
                    </div>
                    <div class="col-md-6 mb-3">
                        <label for="contactPhone" class="form-label">Phone Number</label>
                        <input type="tel" id="contactPhone" class="form-control" required placeholder="+234...">
                    </div>
                </div>

                <h5 class="text-secondary border-bottom pb-2 mb-3 mt-2"><i class="fa-solid fa-lock me-2"></i>Security</h5>
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label for="password" class="form-label">Password</label>
                        <input type="password" id="password" class="form-control" required placeholder="Create password">
                    </div>
                    <div class="col-md-6 mb-3">
                        <label for="confirmPassword" class="form-label">Confirm Password</label>
                        <input type="password" id="confirmPassword" class="form-control" required placeholder="Repeat password">
                    </div>
                </div>

                <div class="form-check mb-4">
                    <input class="form-check-all" type="checkbox" id="termsCheck" required>
                    <label class="form-check-label text-muted small" for="termsCheck">
                        I confirm that the client details provided above are accurate.
                    </label>
                </div>

                <button type="submit" class="btn btn-danger w-100 py-2 fw-bold">Register Client</button>
            </form>
        </div>
    </div>

   <script>
        const regForm = document.getElementById('registrationForm');
        const passInput = document.getElementById('password');
        const confirmPassInput = document.getElementById('confirmPassword');
        const errorDiv = document.getElementById('error-message');
        const successDiv = document.getElementById('success-message');

        regForm.addEventListener('submit', function(event) {
            event.preventDefault();

            errorDiv.classList.add('d-none');
            successDiv.classList.add('d-none');

            // 1. Password confirmation check
            if (passInput.value !== confirmPassInput.value) {
                errorDiv.textContent = "Validation Error: Passwords do not match!";
                errorDiv.classList.remove('d-none');
                confirmPassInput.value = ""; 
                return;
            }

            // 2. Success validation action
            successDiv.textContent = "Account created successfully! Redirecting to login page...";
            successDiv.classList.remove('d-none');
            
            // 3. Wait 2 seconds, then send them to the login form
            setTimeout(function() {
                window.location.href = "form.html"; // Make sure this matches your login file name
            }, 2000); 
        });
    </script>
</body>
</html>
