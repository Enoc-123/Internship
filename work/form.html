<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login Validation</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">

<style>
        body {
            background: linear-gradient(180deg, #ffeb3b, #f44336) !important;
        }
    </style>


</head>
<body class="bg-warning">

    <div class="container d-flex justify-content-center align-items-center min-vh-100">
        <div class="card p-4 shadow" style="width: 100%; max-width: 400px;">
            <h3 class="text-center mb-4 text-danger">Sign In</h3>
            
            <div id="error-message" class="alert alert-danger d-none" role="alert"></div>

            <form id="loginForm">
                <div class="mb-3">
                    <label for="username" class="form-label">Username</label>
                    <input type="text" id="username" class="form-control" required placeholder="Enter username">
                </div>
                <div class="mb-3">
                    <label for="password" class="form-label">Password</label>
                    <input type="password" id="password" class="form-control" required placeholder="Enter password">
                </div>
                <button type="submit" class="btn btn-danger w-100">Login</button>

                <div class="text-center">
                    <span class="text-muted small">New client?</span>
                    <a href="new.html" class="text-primary small fw-bold text-decoration-none ms-1">Create an account</a>
                </div>
            </form>
            
        
    </div>

    <script>
        // Grab the HTML elements
        const loginForm = document.getElementById('loginForm');
        const usernameInput = document.getElementById('username');
        const passwordInput = document.getElementById('password');
        const errorDiv = document.getElementById('error-message');

        const CORRECT_USERNAME = "admin";
        const CORRECT_PASSWORD = "password123";
        const REDIRECT_URL = "https://enoc-123.github.io/Internship/work/work.html";
        // Listen for submission
        loginForm.addEventListener('submit', function(event) {
            event.preventDefault();

            const enteredUsername = usernameInput.value.trim();
            const enteredPassword = passwordInput.value.trim();

            if (enteredUsername === CORRECT_USERNAME && enteredPassword === CORRECT_PASSWORD) {
                errorDiv.classList.add('d-none');
                alert("Login successful! Redirecting...");
                window.location.href = REDIRECT_URL;
            } else {
                errorDiv.textContent = "Invalid username or password.";
                errorDiv.classList.remove('d-none');
                passwordInput.value = "";
            }
        });
    </script>
</body>
</html>
