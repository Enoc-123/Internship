<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assignment Form</title>
</head>
<body style="background-color: aliceblue;font-family: Georgia, 'Times New Roman', Times, serif;">
    <h1 style="background-color: rgb(3, 3, 31); color: white; padding: 50px;">Welcome Back!!</h1>
<form action="/mark.html" style="padding:50px;" method="post" enctype="multipart/form-data">
    <fieldset>
        <legend>Login to Your Account</legend><br>
      <label for="fname">Username</label>
      <input type="text" id="fname" name="fname" required autofocus placeholder="User-Name" size="25"><br><br>
      <!--<label for="lname">Last-Name(Surname)</label>
      <input type="text" id="lname" name="lname" required placeholder="Last-Name" size="25"><br><br>
      <label for="mname">Middle Name</label>
      <input type="text" id="mname" name="mname" placeholder="Middlename" size="25"><br><br>-->
      <label for="email">Email Address</label>
      <input type="email" id="email" name="email" required placeholder="Email Address" size="25"><br><br>
      <label for="pwd">Password</label>
      <input type="password" id="pwd" name="pwd" required placeholder="Password" size="25"><br><br>
      <input type="submit" name="submit" id="submit" value="Login" style="background-color: rgb(2, 2, 46); color: white;">
    </fieldset><br><br>

<p>I Don't have an Account. <a href="form.html" target="_parent" style="color: rgb(3, 3, 31);">Register</a></p>

</form>





</body>
</html>
